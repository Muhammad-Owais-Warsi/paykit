name: E2E

on:
  workflow_dispatch:
    inputs:
      target:
        description: E2E target to run
        required: true
        type: choice
        default: all
        options:
          - all
          - cli
          - stripe
          - polar

permissions: {}

jobs:
  cli:
    name: CLI E2E
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'cli' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-stripe
      cancel-in-progress: false
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_STRIPE_SK: ${{ secrets.E2E_STRIPE_SK }}
      E2E_STRIPE_WHSEC: ${{ secrets.E2E_STRIPE_WHSEC }}
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate CLI E2E configuration
        run: |
          set -euo pipefail
          for name in E2E_STRIPE_SK E2E_STRIPE_WHSEC TEST_DATABASE_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required configuration: $name"
              exit 1
            fi
          done

      - name: Run CLI E2E suite
        run: pnpm --filter e2e test:cli

  stripe:
    name: Stripe E2E
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'stripe' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-stripe
      cancel-in-progress: false
    timeout-minutes: 60
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_STRIPE_SK: ${{ secrets.E2E_STRIPE_SK }}
      E2E_STRIPE_WHSEC: ${{ secrets.E2E_STRIPE_WHSEC }}
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Stripe E2E configuration
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN_STRIPE }}
        run: |
          set -euo pipefail
          for name in CF_TUNNEL_TOKEN E2E_STRIPE_SK E2E_STRIPE_WHSEC TEST_DATABASE_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required configuration: $name"
              exit 1
            fi
          done

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@b80ad7aa7850e1ec9960d75831f32ac9855df988 # v2

      - name: Check cloudflared version
        run: cloudflared --version

      - name: Install Playwright Chromium
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run Stripe E2E suite
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN_STRIPE }}
        run: |
          set -euo pipefail
          cloudflared tunnel --url http://127.0.0.1:4567 run --token "$CF_TUNNEL_TOKEN" > cloudflared.log 2>&1 &
          cloudflared_pid=$!

          cleanup() {
            if kill -0 "$cloudflared_pid" 2>/dev/null; then
              kill "$cloudflared_pid" || true
              wait "$cloudflared_pid" || true
            fi
          }

          trap cleanup EXIT

          readiness_timeout_s=30
          readiness_deadline=$((SECONDS + readiness_timeout_s))

          while true; do
            if ! kill -0 "$cloudflared_pid" 2>/dev/null; then
              echo "::error::cloudflared exited before tests started"
              if [ -f cloudflared.log ]; then
                cat cloudflared.log
              fi
              exit 1
            fi

            if [ -f cloudflared.log ] && grep -Eq 'Registered tunnel|Connection [A-Za-z0-9]+ registered|INF.*Registered tunnel connection' cloudflared.log; then
              break
            fi

            if [ "$SECONDS" -ge "$readiness_deadline" ]; then
              echo "::error::Timed out waiting for cloudflared readiness"
              if [ -f cloudflared.log ]; then
                cat cloudflared.log
              fi
              exit 1
            fi

            sleep 0.5
          done

          pnpm --filter e2e test:stripe

      - name: Upload cloudflared log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: ignore
          name: stripe-e2e-cloudflared-log
          path: cloudflared.log

  polar:
    name: Polar E2E
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.target == 'all' || inputs.target == 'polar' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-polar
      cancel-in-progress: false
    timeout-minutes: 60
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      E2E_POLAR_ACCESS_TOKEN: ${{ secrets.E2E_POLAR_ACCESS_TOKEN }}
      E2E_POLAR_WHSEC: ${{ secrets.E2E_POLAR_WHSEC }}
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Polar E2E configuration
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN_POLAR }}
        run: |
          set -euo pipefail
          for name in CF_TUNNEL_TOKEN E2E_POLAR_ACCESS_TOKEN E2E_POLAR_WHSEC TEST_DATABASE_URL; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required configuration: $name"
              exit 1
            fi
          done

      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@b80ad7aa7850e1ec9960d75831f32ac9855df988 # v2

      - name: Check cloudflared version
        run: cloudflared --version

      - name: Install Playwright Chromium
        run: pnpm --filter e2e exec playwright install --with-deps chromium

      - name: Run Polar E2E suite
        env:
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN_POLAR }}
        run: |
          set -euo pipefail
          cloudflared tunnel --url http://127.0.0.1:4567 run --token "$CF_TUNNEL_TOKEN" > cloudflared.log 2>&1 &
          cloudflared_pid=$!

          cleanup() {
            if kill -0 "$cloudflared_pid" 2>/dev/null; then
              kill "$cloudflared_pid" || true
              wait "$cloudflared_pid" || true
            fi
          }

          trap cleanup EXIT

          readiness_timeout_s=30
          readiness_deadline=$((SECONDS + readiness_timeout_s))

          while true; do
            if ! kill -0 "$cloudflared_pid" 2>/dev/null; then
              echo "::error::cloudflared exited before tests started"
              if [ -f cloudflared.log ]; then
                cat cloudflared.log
              fi
              exit 1
            fi

            if [ -f cloudflared.log ] && grep -Eq 'Registered tunnel|Connection [A-Za-z0-9]+ registered|INF.*Registered tunnel connection' cloudflared.log; then
              break
            fi

            if [ "$SECONDS" -ge "$readiness_deadline" ]; then
              echo "::error::Timed out waiting for cloudflared readiness"
              if [ -f cloudflared.log ]; then
                cat cloudflared.log
              fi
              exit 1
            fi

            sleep 0.5
          done

          pnpm --filter e2e test:polar

      - name: Upload cloudflared log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: ignore
          name: polar-e2e-cloudflared-log
          path: cloudflared.log
